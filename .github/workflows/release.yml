name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-pdqflasher:
    name: PDQFlasher Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdqflasher
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  test-pdqmanager:
    name: PDQManager Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdqmanager
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  build-pdqflasher:
    name: Build PDQFlasher
    needs: [test-pdqflasher]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdqflasher
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdqflasher-dist
          path: tools/pdqflasher/dist/

  build-pdqmanager:
    name: Build PDQManager
    needs: [test-pdqmanager]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdqmanager
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdqmanager-dist
          path: tools/pdqmanager/dist/

  release:
    name: Create GitHub Release
    needs: [build-pdqflasher, build-pdqmanager]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PDQFlasher artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdqflasher-dist
          path: dist/pdqflasher/

      - name: Download PDQManager artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdqmanager-dist
          path: dist/pdqmanager/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pdqflasher/*
            dist/pdqmanager/*
