name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-pdqflasher:
    name: PDQFlasher Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: tools/pdqflasher
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check pdqflasher/ tests/
      - name: Check formatting with black
        run: black --check pdqflasher/ tests/
      - name: Run tests
        run: pytest --tb=short -q

  test-pdqmanager:
    name: PDQManager Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: tools/pdqmanager
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check pdqmanager/ tests/
      - name: Check formatting with black
        run: black --check pdqmanager/ tests/
      - name: Run tests
        run: pytest --tb=short -q
